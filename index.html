<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexGen - Universal Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0f172a; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-gradient { background: linear-gradient(90deg, #3b82f6, #2563eb); transition: all 0.3s ease; }
        .btn-gradient:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(37, 99, 235, 0.4); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <div class="text-center mb-10">
        <div class="flex items-center justify-center gap-2 mb-2">
            <i class="fas fa-globe text-3xl text-blue-500"></i>
            <h1 class="text-4xl font-black tracking-tight">NEXGEN</h1>
        </div>
        <p class="text-gray-400">Multi-Platform Media Extractor</p>
    </div>

    <div class="glass w-full max-w-lg p-6 rounded-3xl shadow-2xl">
        <div class="relative flex flex-col sm:flex-row gap-3">
            <input type="text" id="videoUrl" placeholder="Paste link here (TikTok, FB, YT...)" 
                class="w-full bg-slate-800 border border-slate-700 p-4 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all text-sm">
            <button onclick="downloadMedia()" id="btnText" class="btn-gradient px-8 py-4 rounded-2xl font-bold uppercase text-xs tracking-wider">
                Generate
            </button>
        </div>
        
        <div id="loading" class="hidden mt-6 text-center">
            <div class="animate-spin inline-block w-8 h-8 border-4 border-blue-500 border-t-transparent rounded-full mb-2"></div>
            <p class="text-sm text-blue-400 font-medium">Connecting to Global Nodes...</p>
        </div>

        <div id="result" class="hidden mt-8 space-y-4">
            <div class="p-4 bg-blue-500/10 rounded-2xl border border-blue-500/20 text-center">
                <p class="text-sm font-semibold text-blue-300 mb-4">Video successfully fetched!</p>
                <a id="downloadBtn" href="#" target="_blank" class="block w-full btn-gradient py-3 rounded-xl font-bold">
                    <i class="fas fa-download mr-2"></i> DOWNLOAD NOW
                </a>
            </div>
        </div>
    </div>

    <footer class="mt-10 text-gray-500 text-xs text-center">
        <p>&copy; 2026 NexGen Downloader • 100% Free Forever</p>
        <div class="flex gap-4 justify-center mt-4 text-lg">
            <i class="fab fa-youtube"></i> <i class="fab fa-tiktok"></i> <i class="fab fa-facebook"></i> <i class="fab fa-instagram"></i>
        </div>
    </footer>

    <script>
        async function downloadMedia() {
            const urlInput = document.getElementById('videoUrl').value;
            const btn = document.getElementById('btnText');
            const loading = document.getElementById('loading');
            const result = document.getElementById('result');
            const downloadBtn = document.getElementById('downloadBtn');

            if (!urlInput) {
                alert("Please paste a link first!");
                return;
            }

            // Reset UI
            result.classList.add('hidden');
            loading.classList.remove('hidden');
            btn.disabled = true;

            try {
                // Using a more stable multi-downloader API
                const response = await fetch(`https://api.vreden.my.id/api/download/tiktok?url=${encodeURIComponent(urlInput)}`);
                const data = await response.json();

                if (data.status === 200 || data.result) {
                    const videoLink = data.result.video || data.result.nowatermark || data.result.data;
                    downloadBtn.href = videoLink;
                    loading.classList.add('hidden');
                    result.classList.remove('hidden');
                } else {
                    throw new Error("API Limit reached");
                }
            } catch (error) {
                loading.classList.add('hidden');
                alert("Server busy or Link invalid. Try again in a moment.");
                console.error(error);
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
