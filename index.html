<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexGen - Premium Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: radial-gradient(circle at top right, #1e293b, #000000);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: white;
            padding: 20px;
        }
        /* iOS Glassmorphism Effect */
        .ios-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 35px;
            width: 100%;
            max-width: 450px;
            padding: 40px 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        .ios-input {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 18px;
            width: 100%;
            padding: 18px;
            color: white;
            outline: none;
            transition: 0.3s;
            font-size: 16px;
        }
        .ios-input:focus { border-color: #007AFF; box-shadow: 0 0 0 4px rgba(0, 122, 255, 0.2); }
        .ios-btn {
            background: #007AFF;
            color: white;
            font-weight: 600;
            padding: 16px;
            border-radius: 18px;
            width: 100%;
            margin-top: 20px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: 0.5px;
        }
        .ios-btn:active { transform: scale(0.96); opacity: 0.9; }
        .ios-btn:disabled { background: #444; cursor: not-allowed; }
        
        .loading-spinner {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #007AFF;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="ios-card">
    <div class="text-center mb-10">
        <div class="bg-blue-600 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-blue-500/30">
            <i class="fas fa-arrow-down text-2xl"></i>
        </div>
        <h1 class="text-3xl font-bold tracking-tight">NexGen</h1>
        <p class="text-gray-400 mt-1">iOS Style Media Downloader</p>
    </div>

    <div class="space-y-2">
        <input type="text" id="urlInput" class="ios-input" placeholder="Paste link here...">
        <button onclick="smartDownload()" id="actionBtn" class="ios-btn">
            GENERATE LINK
        </button>
    </div>

    <div id="loader" class="hidden mt-8 text-center">
        <div class="loading-spinner"></div>
        <p class="text-sm text-gray-400 mt-3 font-medium">Fetching from Secure Server...</p>
    </div>

    <div id="result" class="hidden mt-8 p-5 rounded-3xl bg-white/5 border border-white/10 text-center animate-fade-in">
        <p class="text-blue-400 font-bold mb-4"><i class="fas fa-check-circle mr-2"></i>Link Generated!</p>
        <a id="dlLink" href="#" target="_blank" class="block w-full bg-white text-black py-4 rounded-2xl font-bold hover:bg-gray-200 transition-all">
            DOWNLOAD VIDEO
        </a>
    </div>
</div>

<script>
async function smartDownload() {
    const url = document.getElementById('urlInput').value;
    const btn = document.getElementById('actionBtn');
    const loader = document.getElementById('loader');
    const result = document.getElementById('result');

    if(!url) return alert("Please enter a URL first!");

    btn.disabled = true;
    loader.classList.remove('hidden');
    result.classList.add('hidden');

    // Multi-Server Logic: Try multiple reliable APIs
    const apis = [
        `https://api.tiklydown.eu.org/api/download?url=${encodeURIComponent(url)}`,
        `https://api.vreden.my.id/api/download/tiktok?url=${encodeURIComponent(url)}`
    ];

    let success = false;

    for (let api of apis) {
        try {
            const response = await fetch(api);
            const data = await response.json();
            
            // Handle different API response structures
            const videoLink = data.video?.noWatermark || data.result?.video || data.result?.nowatermark;

            if (videoLink) {
                document.getElementById('dlLink').href = videoLink;
                result.classList.remove('hidden');
                success = true;
                break;
            }
        } catch (e) { console.log("Trying next server..."); }
    }

    loader.classList.add('hidden');
    btn.disabled = false;

    if (!success) {
        alert("সার্ভার ওভারলোড। দয়া করে ১ মিনিট পর আবার ট্রাই করুন।");
    }
}
</script>

</body>
</html>
