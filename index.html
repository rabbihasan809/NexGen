<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexGen Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; justify-center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #111; border: 1px solid #333; padding: 30px; border-radius: 20px; width: 100%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 15px; border-radius: 10px; border: none; background: #222; color: #fff; margin-bottom: 20px; outline: none; }
        button { width: 100%; padding: 15px; border-radius: 10px; border: none; background: #0070f3; color: #fff; font-weight: bold; cursor: pointer; }
        .result { margin-top: 20px; display: none; padding: 15px; background: #1a1a1a; border-radius: 10px; }
        .dl-link { display: block; background: #22c55e; color: #fff; padding: 10px; border-radius: 8px; text-decoration: none; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="font-size: 24px; font-weight: 900; margin-bottom: 20px;">NEXGEN DL</h2>
    <input type="text" id="url" placeholder="TikTok Link পেস্ট করুন...">
    <button onclick="download()" id="btn">DOWNLOAD</button>

    <div id="loader" style="display:none; margin-top: 20px; color: #888;">কাজ চলছে, দয়া করে অপেক্ষা করুন...</div>

    <div id="result" class="result">
        <p style="color: #22c55e;">ভিডিও পাওয়া গেছে!</p>
        <a id="hd" class="dl-link" href="#" target="_blank">Download Video (HD)</a>
    </div>
</div>

<script>
async function download() {
    const url = document.getElementById('url').value;
    const btn = document.getElementById('btn');
    const loader = document.getElementById('loader');
    const result = document.getElementById('result');

    if(!url) return alert("আগে লিঙ্ক দিন!");

    btn.disabled = true;
    loader.style.display = 'block';
    result.style.display = 'none';

    try {
        // এই এপিআইটি বর্তমানে সবচেয়ে স্টেবল
        const response = await fetch(`https://api.tiklydown.eu.org/api/download?url=${encodeURIComponent(url)}`);
        const data = await response.json();

        if(data && data.video) {
            document.getElementById('hd').href = data.video.noWatermark || data.video.url;
            result.style.display = 'block';
        } else {
            alert("এই লিঙ্কটি কাজ করছে না। অন্য একটি ভিডিও ট্রাই করুন।");
        }
    } catch (err) {
        alert("সার্ভারে সমস্যা হচ্ছে, আবার চেষ্টা করুন।");
    } finally {
        btn.disabled = false;
        loader.style.display = 'none';
    }
}
</script>

</body>
</html>
